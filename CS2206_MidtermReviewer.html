 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2206 Midterm Master Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .quiz-card { max-width: 900px; margin: 30px auto; border-radius: 20px; border: none; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .option-btn { text-align: left; margin-bottom: 10px; border: 2px solid #dee2e6; transition: 0.2s; padding: 15px; }
        .option-btn:hover:not([disabled]) { background-color: #f8f9fa; border-color: #0d6efd; }
        .correct { background-color: #d1e7dd !important; border-color: #198754 !important; color: #0f5132 !important; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #842029 !important; }
        #progress-text { font-weight: bold; color: #0d6efd; }
        .hint-text { font-style: italic; color: #6c757d; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card quiz-card p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="text-primary"><i class="fas fa-server me-2"></i>CS2206 Midterm Review</h3>
            <span id="progress-text">Question 1/50</span>
        </div>

        <div class="progress mb-4" style="height: 12px;">
            <div id="progress-bar" class="progress-bar progress-bar-striped bg-success" role="progressbar" style="width: 2%"></div>
        </div>

        <div id="quiz-area">
            <h4 id="question-text" class="mb-4">Question goes here?</h4>
            <div id="options-container" class="d-grid gap-2"></div>
            <div id="hint-area" class="alert alert-info mt-3 hint-text"></div>
        </div>

        <div id="result-area" class="text-center d-none py-5">
            <i class="fas fa-award fa-5x text-warning mb-4"></i>
            <h1>Exam Completed!</h1>
            <h2 class="display-4"><span id="final-score">0</span> / 50</h2>
            <p id="feedback-msg" class="lead"></p>
            <button class="btn btn-primary btn-lg mt-3" onclick="location.reload()">Restart Quiz</button>
        </div>

        <div id="controls" class="d-flex justify-content-between mt-4">
            <button class="btn btn-outline-secondary" onclick="toggleHint()"><i class="fas fa-lightbulb"></i> Hint</button>
            <button id="next-btn" class="btn btn-primary px-5 d-none" onclick="nextQuestion()">Next <i class="fas fa-chevron-right ms-2"></i></button>
        </div>
    </div>
</div>

<script>
const quizData = [
    // MODULE 5: STORED PROCEDURES
    { q: "Which version of MySQL first introduced stored procedures?", o: ["Version 4.1", "Version 5.0", "Version 5.1", "Version 8.0"], a: 1, h: "It is the landmark release from the mid-2000s." },
    { q: "A stored procedure is defined as a collection of:", o: ["Java classes", "SQL statements used together", "PHP scripts", "HTML tags"], a: 1, h: "Procedures encapsulate database logic." },
    { q: "Which SQL standard did MySQL implement for stored procedures?", o: ["SQL:1992", "SQL:1999", "SQL:2003", "SQL:2008"], a: 2, h: "This standard replaced SQL:1999." },
    { q: "What is a primary advantage of stored procedures regarding network traffic?", o: ["Increase trips to DB", "Encrypt data", "Reduce traffic by combining queries", "Disable network"], a: 2, h: "Fewer calls between the app and the server." },
    { q: "How do stored procedures improve security?", o: ["Require root password", "Prevent SQL injection via parameters", "Hide DB from internet", "Delete data after reading"], a: 1, h: "Parameterized inputs are safer than dynamic strings." },
    { q: "Where does MySQL store stored procedure data?", o: ["information_schema", "mysql.proc table", "Flat file", "performance_schema"], a: 1, h: "It's a system table in the 'mysql' database." },
    { q: "Maximum length for a stored procedure name?", o: ["32 chars", "64 chars", "128 chars", "256 chars"], a: 1, h: "Standard MySQL identifier limit." },
    { q: "Why change the DELIMITER in the MySQL client?", o: ["Speed", "Allow semicolons inside code", "Encryption", "End of procedure"], a: 1, h: "Prevents the client from executing the code too early." },
    { q: "Which parameter type is the default?", o: ["OUT", "INOUT", "IN", "GLOBAL"], a: 2, h: "The most common way to pass data into a routine." },
    { q: "What is the function of an OUT parameter?", o: ["Pass data in", "Set in procedure/accessed by caller", "Terminate procedure", "Print results"], a: 1, h: "It exports a value back to the environment." },
    { q: "Which characteristic determines execution permissions?", o: ["LANGUAGE", "COMMENT", "SQL SECURITY", "DETERMINISTIC"], a: 2, h: "It defines whose rights are used." },
    { q: "If SQL SECURITY is INVOKER, it runs with privileges of:", o: ["Creator", "Root", "The user calling it", "Anonymous"], a: 2, h: "The person invoking the command." },
    { q: "Order of DECLARE statements in BEGIN...END?", o: ["Cursors, Handlers, Vars", "Handlers, Cursors, Vars", "Vars, Cursors, Handlers", "Vars, Handlers, Cursors"], a: 2, h: "Variables must always come first." },
    { q: "Which statement executes a stored procedure?", o: ["RUN", "EXECUTE", "CALL", "START"], a: 2, h: "You 'call' the routine by name." },
    { q: "Which flow control is NOT supported by MySQL?", o: ["IF", "WHILE", "FOR", "LOOP"], a: 2, h: "MySQL uses WHILE and REPEAT instead of this common loop." },
    { q: "Command to see procedure source code?", o: ["SHOW STATUS", "DESCRIBE", "SHOW CREATE PROCEDURE", "SELECT *"], a: 2, h: "Similar to showing table creation code." },
    { q: "Permission needed to run a procedure?", o: ["SELECT", "CREATE ROUTINE", "EXECUTE", "ALTER"], a: 2, h: "Standard execution privilege." },
    { q: "Creating a procedure with no database selected results in:", o: ["Random DB", "Error", "Auto-create", "Test DB"], a: 1, h: "MySQL needs an active context." },
    { q: "What is 'Encapsulation' in procedures?", o: ["Smaller DB", "Black box usage", "Prevents changes", "Auto-backup"], a: 1, h: "Hiding internal complexity from the user." },
    { q: "True or False: Stored procedures are independent of the storage engine.", o: ["True", "False"], a: 0, h: "They run on the server layer above engines like InnoDB." },

    // MODULE 6: ROUTINES, TRIGGERS, EVENTS
    { q: "Difference between stored function and procedure?", o: ["Procedures are faster", "Functions return a value/use in expressions", "Functions can't touch tables", "One statement only"], a: 1, h: "Functions act like built-in SQL keywords." },
    { q: "Keyword to send a value back from a function?", o: ["OUTPUT", "SEND", "RETURN", "RESULT"], a: 2, h: "Commonly used to exit functions with data." },
    { q: "What is a 'Trigger'?", o: ["Server reboot", "Automatic object on table modification", "Scheduled task", "Delete command"], a: 1, h: "It 'fires' when data changes." },
    { q: "Triggers activate on which three statements?", o: ["SELECT, INSERT, UPDATE", "CREATE, ALTER, DROP", "INSERT, UPDATE, DELETE", "GRANT, REVOKE"], a: 2, h: "Data Modification Language (DML) actions." },
    { q: "Trigger timing options?", o: ["BEFORE/AFTER", "DURING/AFTER", "START/END", "FAST/SLOW"], a: 0, h: "Either before the change or after it's committed." },
    { q: "MySQL 'Event' is similar to:", o: ["grep", "cron", "bash", "ls"], a: 1, h: "A Linux time-based job scheduler." },
    { q: "Purpose of an Event?", o: ["Log logins", "Execute SQL on a schedule", "Prevent deletion", "Speed up SELECT"], a: 1, h: "Used for maintenance tasks like cleaning logs." },
    { q: "Where to check Event activity?", o: ["Browser", "Error log", "information_schema", "event_log"], a: 2, h: "The standard schema for metadata." },
    { q: "Clause indicating a function only reads data?", o: ["NO SQL", "READS SQL DATA", "MODIFIES SQL DATA", "DETERMINISTIC"], a: 1, h: "A self-explanatory SQL routine characteristic." },
    { q: "How many RETURN statements must a function have?", o: ["0", "At least 1", "Exactly 2", "Max 5"], a: 1, h: "A function must always produce an output." },
    { q: "True or False: A trigger can log table changes.", o: ["True", "False"], a: 0, h: "Commonly used for audit trails." },
    { q: "BEGIN...END block forms what?", o: ["Simple statement", "Compound statement", "Comment", "Table"], a: 1, h: "A group of statements treated as one." },
    { q: "Trigger keyword for value before update?", o: ["PREVIOUS", "OLD", "NEW", "BEFORE"], a: 1, h: "Refers to the existing data." },
    { q: "Trigger keyword for value after update?", o: ["RECENT", "OLD", "NEW", "AFTER"], a: 2, h: "Refers to the incoming data." },
    { q: "Statement to choose between blocks based on value?", o: ["LOOP", "CASE", "WHILE", "REPEAT"], a: 1, h: "An alternative to IF-ELSEIF." },

    // MODULE 7: CURSORS
    { q: "What is a database cursor?", o: ["Text editor line", "Pointer to result set record", "Duplicate tool", "Security bypass"], a: 1, h: "Used for row-by-row processing." },
    { q: "Which version introduced Cursors?", o: ["4.0", "5.0", "5.5", "8.0"], a: 1, h: "Same version as stored procedures." },
    { q: "MySQL supports which cursor type?", o: ["Client-side", "Server-side", "Bi-directional", "Write-only"], a: 1, h: "They run internally on the MySQL server." },
    { q: "What does 'forward-only' mean for cursors?", o: ["New tables only", "Forward/Backward", "One record at a time forward", "Skip records"], a: 2, h: "No scrolling backward." },
    { q: "What is an 'asensitive' cursor?", o: ["Points to temp copy", "Points at real data", "Ignores case", "Emotional"], a: 1, h: "Does not work on a temporary table." },
    { q: "Main drawback of asensitive cursors?", o: ["Slow", "Memory heavy", "Data changes affect cursor", "10 row limit"], a: 2, h: "Isolation level is low." },
    { q: "MySQL cursors are:", o: ["Read-only", "Read-write", "Write-only", "Append-only"], a: 0, h: "You cannot UPDATE via the cursor itself." },
    { q: "Statement to move cursor and get data?", o: ["OPEN", "NEXT", "FETCH", "MOVE"], a: 2, h: "It 'fetches' the row into variables." },
    { q: "Correct sequence for cursor use?", o: ["OPEN, FETCH, CLOSE, DECLARE", "DECLARE, OPEN, FETCH, CLOSE", "FETCH, OPEN, DECLARE, CLOSE", "DECLARE, FETCH, OPEN, CLOSE"], a: 1, h: "You must define it before you open it." },
    { q: "Handler condition to detect end of results?", o: ["NOT FOUND", "SQLERROR", "FINISHED", "EXIT"], a: 0, h: "Standard SQL state for end of data." },
    { q: "What must you do when finished with a cursor?", o: ["DELETE", "CLOSE", "COMMIT", "DROP"], a: 1, h: "Free up server resources." },
    { q: "How many records does a cursor FETCH at once?", o: ["All", "Two", "One", "Half"], a: 2, h: "Cursors process row-by-row." },
    { q: "To restart a MySQL cursor, you must:", o: ["Use PREVIOUS", "Close and reopen", "Use RESTART", "Cannot restart"], a: 1, h: "Re-executes the query." },
    { q: "Where can cursors be used?", o: ["Client only", "Stored routines only", "Standard SELECT", "HTML forms"], a: 1, h: "They are for procedural database code." },
    { q: "Purpose of DECLARE CONTINUE HANDLER for cursors?", o: ["Start service", "Handle end of data", "Skip errors", "Close connection"], a: 1, h: "Prevents procedure from crashing when no rows are left." }
];

let currentIdx = 0;
let score = 0;
let hintVisible = false;

function initQuiz() {
    showQuestion();
}

function showQuestion() {
    const q = quizData[currentIdx];
    document.getElementById('question-text').innerText = `${currentIdx + 1}. ${q.q}`;
    document.getElementById('progress-text').innerText = `Question ${currentIdx + 1}/50`;
    document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / 50) * 100}%`;
    
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    
    q.o.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'btn option-btn';
        btn.innerHTML = `<span class="badge bg-light text-dark me-2">${String.fromCharCode(65+i)}</span> ${opt}`;
        btn.onclick = () => checkAnswer(i);
        container.appendChild(btn);
    });

    document.getElementById('hint-area').innerText = q.h;
    document.getElementById('hint-area').style.display = 'none';
    document.getElementById('next-btn').classList.add('d-none');
}

function checkAnswer(choice) {
    const correct = quizData[currentIdx].a;
    const btns = document.querySelectorAll('.option-btn');
    
    btns.forEach((b, i) => {
        if(i === correct) b.classList.add('correct');
        else if(i === choice) b.classList.add('wrong');
        b.disabled = true;
    });

    if(choice === correct) score++;
    document.getElementById('next-btn').classList.remove('d-none');
}

function nextQuestion() {
    currentIdx++;
    if(currentIdx < 50) {
        showQuestion();
    } else {
        showResults();
    }
}

function toggleHint() {
    const h = document.getElementById('hint-area');
    h.style.display = h.style.display === 'none' ? 'block' : 'none';
}

function showResults() {
    document.getElementById('quiz-area').classList.add('d-none');
    document.getElementById('controls').classList.add('d-none');
    document.getElementById('result-area').classList.remove('d-none');
    document.getElementById('final-score').innerText = score;
    
    const msg = score >= 40 ? "Excellent! You're an SQL Master." : score >= 25 ? "Good job! Review the Cursor section one more time." : "Keep studying! Focus on the Stored Procedure basics.";
    document.getElementById('feedback-msg').innerText = msg;
}

initQuiz();
</script>
</body>
</html>
