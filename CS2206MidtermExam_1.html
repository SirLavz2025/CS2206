 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LU - CCS Secure Exam Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; -webkit-user-select: none; }
        .main-container { padding: 15px; max-width: 900px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* Real-time Status Panel */
        .status-panel { 
            background: #fff; border-radius: 12px; padding: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-left: 5px solid #004a99; 
            transition: all 0.3s ease;
        }
        
        .violation-active { border-left-color: #dc3545 !important; background: #fff5f5 !important; animation: shake 0.5s; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(5px); } 50% { transform: translateX(-5px); } 100% { transform: translateX(0); } }

        .quiz-card { border-radius: 15px; border: none; box-shadow: 0 10px 40px rgba(0,0,0,0.05); background: white; padding: 25px; }
        .option-btn { text-align: left; margin-bottom: 12px; border: 2px solid #edf2f7; padding: 15px; width: 100%; background: white; border-radius: 12px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .selected-opt { background-color: #e6f0ff !important; border-color: #004a99 !important; color: #004a99 !important; font-weight: 600; }

        #violation-overlay, #lock-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.98); color: white; z-index: 10001; 
            justify-content: center; align-items: center; flex-direction: column; text-align: center; padding: 30px; 
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="lock-overlay">
    <i class="fas fa-user-lock fa-5x mb-4 text-warning"></i>
    <h1 class="fw-bold">SESSION LOCKED</h1>
    <p class="lead" id="lock-message">Entry denied. A session is already active or finished for this ID.</p>
</div>

<div id="violation-overlay">
    <i class="fas fa-exclamation-triangle fa-5x mb-4 text-danger"></i>
    <h1 class="fw-bold">VIOLATION DETECTED</h1>
    <p class="lead">You moved away from the exam window.</p>
    <div class="bg-white text-dark p-3 rounded mb-4">
        <strong style="font-size: 1.5rem;">Current Violations: <span id="overlay-count">0</span></strong>
    </div>
    <button class="btn btn-danger btn-lg px-5 fw-bold" onclick="closeViolation()">RETURN TO EXAM</button>
</div>

<div class="main-container">
    <div id="realtime-status" class="status-panel d-none">
        <div class="d-flex justify-content-between align-items-center">
            <div><span class="fw-bold text-primary"><i class="fas fa-shield-alt me-1"></i> Secure Session</span></div>
            <div class="text-end">
                <small class="text-muted d-block fw-bold" style="font-size: 0.7rem;">VIOLATIONS</small>
                <span id="live-violation-count" class="badge bg-success fs-6">0</span>
            </div>
        </div>
    </div>

    <div class="card quiz-card">
        <div id="setup-screen" class="text-center py-4">
            <h2 class="fw-bold">Laguna University</h2>
            <p class="text-muted">Secure Examination Portal</p>
            <div class="p-4 border rounded bg-light">
                <input type="text" id="student-name" class="form-control mb-3" placeholder="Full Name">
                <input type="text" id="student-id" class="form-control mb-4" placeholder="Student ID">
                <button class="btn btn-primary btn-lg w-100" onclick="startExam()">Start Exam</button>
            </div>
        </div>

        <div id="exam-area" class="d-none">
            <div class="d-flex justify-content-between mb-3">
                <span id="progress-text" class="badge bg-dark">Question 1/50</span>
            </div>
            <div id="quiz-content">
                <h4 id="question-text" class="mb-4 fw-bold">...</h4>
                <div id="options-container"></div>
            </div>
            <div class="d-flex justify-content-between mt-5 pt-3 border-top">
                <button class="btn btn-outline-secondary invisible" id="prev-btn" onclick="prevQuestion()">Back</button>
                <button id="next-btn" class="btn btn-primary px-4" onclick="nextQuestion()">Next</button>
                <button id="submit-btn" class="btn btn-success px-4 d-none" onclick="finishExam()">Submit Exam</button>
            </div>
        </div>

        <div id="result-area" class="text-center d-none py-4">
            <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
            <h2 class="fw-bold">Exam Submitted</h2>
            <div class="display-3 text-primary my-3"><span id="final-score">0</span>/50</div>
            <p id="final-violation-msg" class="text-danger fw-bold"></p>
            <button class="btn btn-dark btn-lg w-100 mt-2" onclick="generateOriginalCertificate()">Download Official Certificate</button>
        </div>
    </div>
</div>

<script>
// Quiz data from your file
const rawQuestions = [
    { q: "Which version of MySQL first introduced stored procedures?", o: ["Version 4.1", "Version 5.0", "Version 5.1", "Version 8.0"], a: "Version 5.0" },
    { q: "A stored procedure is defined as a collection of:", o: ["Java classes", "SQL statements used together", "PHP scripts", "HTML tags"], a: "SQL statements used together" },
    { q: "Which SQL standard did MySQL implement for stored procedures?", o: ["SQL:1992", "SQL:1999", "SQL:2003", "SQL:2008"], a: "SQL:2003" },
    { q: "What is a primary advantage of stored procedures regarding network traffic?", o: ["Increase trips to DB", "Encrypt data", "Reduce traffic by combining queries", "Disable network"], a: "Reduce traffic by combining queries" },
    { q: "How do stored procedures improve security?", o: ["Require root password", "Prevent SQL injection via parameters", "Hide DB from internet", "Delete data after reading"], a: "Prevent SQL injection via parameters" },
    { q: "Where does MySQL store stored procedure data?", o: ["information_schema", "mysql.proc table", "Flat file", "performance_schema"], a: "mysql.proc table" },
    { q: "Maximum length for a stored procedure name?", o: ["32 chars", "64 chars", "128 chars", "256 chars"], a: "64 chars" },
    { q: "Why change the DELIMITER in the MySQL client?", o: ["Speed", "Allow semicolons inside code", "Encryption", "End of procedure"], a: "Allow semicolons inside code" },
    { q: "Which parameter type is the default?", o: ["OUT", "INOUT", "IN", "GLOBAL"], a: "IN" },
    { q: "What is the function of an OUT parameter?", o: ["Pass data in", "Set in procedure/accessed by caller", "Terminate procedure", "Print results"], a: "Set in procedure/accessed by caller" },
    { q: "Which characteristic determines execution permissions?", o: ["LANGUAGE", "COMMENT", "SQL SECURITY", "DETERMINISTIC"], a: "SQL SECURITY" },
    { q: "If SQL SECURITY is INVOKER, it runs with privileges of:", o: ["Creator", "Root", "The user calling it", "Anonymous"], a: "The user calling it" },
    { q: "Order of DECLARE statements in BEGIN...END?", o: ["Cursors, Handlers, Vars", "Handlers, Cursors, Vars", "Vars, Cursors, Handlers", "Vars, Handlers, Cursors"], a: "Vars, Cursors, Handlers" },
    { q: "Which statement executes a stored procedure?", o: ["RUN", "EXECUTE", "CALL", "START"], a: "CALL" },
    { q: "Which flow control is NOT supported by MySQL?", o: ["IF", "WHILE", "FOR", "LOOP"], a: "FOR" },
    { q: "Command to see procedure source code?", o: ["SHOW STATUS", "DESCRIBE", "SHOW CREATE PROCEDURE", "SELECT *"], a: "SHOW CREATE PROCEDURE" },
    { q: "Permission needed to run a procedure?", o: ["SELECT", "CREATE ROUTINE", "EXECUTE", "ALTER"], a: "EXECUTE" },
    { q: "Creating a procedure with no database selected results in:", o: ["Random DB", "Error", "Auto-create", "Test DB"], a: "Error" },
    { q: "What is 'Encapsulation' in procedures?", o: ["Smaller DB", "Black box usage", "Prevents changes", "Auto-backup"], a: "Black box usage" },
    { q: "True or False: Stored procedures are independent of the storage engine.", o: ["True", "False"], a: "True" },
    { q: "Difference between stored function and procedure?", o: ["Procedures are faster", "Functions return a value/use in expressions", "Functions can't touch tables", "One statement only"], a: "Functions return a value/use in expressions" },
    { q: "Keyword to send a value back from a function?", o: ["OUTPUT", "SEND", "RETURN", "RESULT"], a: "RETURN" },
    { q: "What is a 'Trigger'?", o: ["Server reboot", "Automatic object on table modification", "Scheduled task", "Delete command"], a: "Automatic object on table modification" },
    { q: "Triggers activate on which three statements?", o: ["SELECT, INSERT, UPDATE", "CREATE, ALTER, DROP", "INSERT, UPDATE, DELETE", "GRANT, REVOKE"], a: "INSERT, UPDATE, DELETE" },
    { q: "Trigger timing options?", o: ["BEFORE/AFTER", "DURING/AFTER", "START/END", "FAST/SLOW"], a: "BEFORE/AFTER" },
    { q: "MySQL 'Event' is similar to:", o: ["grep", "cron", "bash", "ls"], a: "cron" },
    { q: "Purpose of an Event?", o: ["Log logins", "Execute SQL on a schedule", "Prevent deletion", "Speed up SELECT"], a: "Execute SQL on a schedule" },
    { q: "Where to check Event activity?", o: ["Browser", "Error log", "information_schema", "event_log"], a: "information_schema" },
    { q: "Clause indicating a function only reads data?", o: ["NO SQL", "READS SQL DATA", "MODIFIES SQL DATA", "DETERMINISTIC"], a: "READS SQL DATA" },
    { q: "How many RETURN statements must a function have?", o: ["0", "At least 1", "Exactly 2", "Max 5"], a: "At least 1" },
    { q: "True or False: A trigger can log table changes.", o: ["True", "False"], a: "True" },
    { q: "BEGIN...END block forms what?", o: ["Simple statement", "Compound statement", "Comment", "Table"], a: "Compound statement" },
    { q: "Trigger keyword for value before update?", o: ["PREVIOUS", "OLD", "NEW", "BEFORE"], a: "OLD" },
    { q: "Trigger keyword for value after update?", o: ["RECENT", "OLD", "NEW", "AFTER"], a: "NEW" },
    { q: "Statement to choose between blocks based on value?", o: ["LOOP", "CASE", "WHILE", "REPEAT"], a: "CASE" },
    { q: "What is a database cursor?", o: ["Text editor line", "Pointer to result set record", "Duplicate tool", "Security bypass"], a: "Pointer to result set record" },
    { q: "Which version introduced Cursors?", o: ["4.0", "5.0", "5.5", "8.0"], a: "5.0" },
    { q: "MySQL supports which cursor type?", o: ["Client-side", "Server-side", "Bi-directional", "Write-only"], a: "Server-side" },
    { q: "What does 'forward-only' mean for cursors?", o: ["New tables only", "Forward/Backward", "One record at a time forward", "Skip records"], a: "One record at a time forward" },
    { q: "What is an 'asensitive' cursor?", o: ["Points to temp copy", "Points at real data", "Ignores case", "Emotional"], a: "Points at real data" },
    { q: "Main drawback of asensitive cursors?", o: ["Slow", "Memory heavy", "Data changes affect cursor", "10 row limit"], a: "Data changes affect cursor" },
    { q: "MySQL cursors are:", o: ["Read-only", "Read-write", "Write-only", "Append-only"], a: "Read-only" },
    { q: "Statement to move cursor and get data?", o: ["OPEN", "NEXT", "FETCH", "MOVE"], a: "FETCH" },
    { q: "Correct sequence for cursor use?", o: ["OPEN, FETCH, CLOSE, DECLARE", "DECLARE, OPEN, FETCH, CLOSE", "FETCH, OPEN, DECLARE, CLOSE", "DECLARE, FETCH, OPEN, CLOSE"], a: "DECLARE, OPEN, FETCH, CLOSE" },
    { q: "Handler condition to detect end of results?", o: ["NOT FOUND", "SQLERROR", "FINISHED", "EXIT"], a: "NOT FOUND" },
    { q: "What must you do when finished with a cursor?", o: ["DELETE", "CLOSE", "COMMIT", "DROP"], a: "CLOSE" },
    { q: "How many records does a cursor FETCH at once?", o: ["All", "Two", "One", "Half"], a: "One" },
    { q: "To restart a MySQL cursor, you must:", o: ["Use PREVIOUS", "Close and reopen", "Use RESTART", "Cannot restart"], a: "Close and reopen" },
    { q: "Where can cursors be used?", o: ["Client only", "Stored routines only", "Standard SELECT", "HTML forms"], a: "Stored routines only" },
    { q: "Purpose of DECLARE CONTINUE HANDLER for cursors?", o: ["Start service", "Handle end of data", "Skip errors", "Close connection"], a: "Handle end of data" }
];

let quizData = [], userAnswers = [], currentIdx = 0;
let isExamActive = false, violations = 0, violationLocked = false;

// Check for existing session
window.onload = function() {
    if (localStorage.getItem("examInProgress") === "true") {
        document.getElementById("lock-overlay").style.display = "flex";
    }
};

function startExam() {
    const sid = document.getElementById('student-id').value.trim();
    if(!sid || !document.getElementById('student-name').value) return alert("All fields required.");
    
    if(localStorage.getItem(`done_${sid}`)) {
        document.getElementById("lock-message").innerText = "ID Already Submitted.";
        document.getElementById("lock-overlay").style.display = "flex";
        return;
    }

    localStorage.setItem("examInProgress", "true");
    localStorage.setItem("sid", sid);

    quizData = [...rawQuestions].sort(() => Math.random() - 0.5).map(i => ({
        q: i.q, o: [...i.o].sort(() => Math.random() - 0.5), a: i.a
    }));
    userAnswers = new Array(quizData.length).fill(null);
    
    document.getElementById('setup-screen').classList.add('d-none');
    document.getElementById('exam-area').classList.remove('d-none');
    document.getElementById('realtime-status').classList.remove('d-none');
    isExamActive = true;
    showQuestion();
}

// REAL-TIME VIOLATION HANDLER
function recordViolation() {
    if (!isExamActive || violationLocked) return;
    
    violationLocked = true;
    violations += 1;

    // Update Live Display
    const badge = document.getElementById('live-violation-count');
    badge.innerText = violations;
    badge.className = "badge bg-danger fs-6";
    
    const panel = document.getElementById('realtime-status');
    panel.classList.add('violation-active');

    // Show Overlay
    document.getElementById('overlay-count').innerText = violations;
    document.getElementById('violation-overlay').style.display = 'flex';
}

function closeViolation() {
    document.getElementById('violation-overlay').style.display = 'none';
    document.getElementById('realtime-status').classList.remove('violation-active');
    setTimeout(() => { violationLocked = false; }, 500);
}

document.addEventListener("visibilitychange", () => { if(document.hidden) recordViolation(); });
window.onblur = recordViolation;

function showQuestion() {
    const q = quizData[currentIdx];
    document.getElementById('question-text').innerText = `${currentIdx + 1}. ${q.q}`;
    document.getElementById('progress-text').innerText = `Question ${currentIdx + 1}/50`;
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    q.o.forEach((opt, i) => {
        const btn = document.createElement('div');
        btn.className = `option-btn ${userAnswers[currentIdx] === i ? 'selected-opt' : ''}`;
        btn.innerHTML = `<span class="badge bg-light text-dark me-3">${String.fromCharCode(65+i)}</span> ${opt}`;
        btn.onclick = () => { userAnswers[currentIdx] = i; showQuestion(); };
        container.appendChild(btn);
    });
    document.getElementById('prev-btn').classList.toggle('invisible', currentIdx === 0);
    const isLast = currentIdx === quizData.length - 1;
    document.getElementById('next-btn').classList.toggle('d-none', isLast);
    document.getElementById('submit-btn').classList.toggle('d-none', !isLast);
}

function nextQuestion() { currentIdx++; showQuestion(); }
function prevQuestion() { currentIdx--; showQuestion(); }

function finishExam() {
    isExamActive = false;
    localStorage.removeItem("examInProgress");
    localStorage.setItem(`done_${localStorage.getItem("sid")}`, "true");
    
    let score = 0;
    quizData.forEach((q, i) => { if(userAnswers[i] !== null && q.o[userAnswers[i]] === q.a) score++; });
    
    document.getElementById('exam-area').classList.add('d-none');
    document.getElementById('realtime-status').classList.add('d-none');
    document.getElementById('result-area').classList.remove('d-none');
    document.getElementById('final-score').innerText = score;
    document.getElementById('final-violation-msg').innerText = `Security Violations: ${violations}`;
}

// RESTORED ORIGINAL CERTIFICATE DESIGN
function generateOriginalCertificate() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const name = document.getElementById('student-name').value.toUpperCase();
    const score = document.getElementById('final-score').innerText;

    // Header Branding
    doc.setFont("times", "bold");
    doc.setFontSize(20);
    doc.text("LAGUNA UNIVERSITY", 105, 40, null, null, "center");
    doc.setFontSize(14);
    doc.text("COLLEGE OF COMPUTER STUDIES", 105, 48, null, null, "center");
    
    doc.setLineWidth(1);
    doc.line(20, 55, 190, 55);
    
    // Body
    doc.setFontSize(16);
    doc.setFont("times", "italic");
    doc.text("This certifies that", 105, 80, null, null, "center");
    
    doc.setFontSize(26);
    doc.setFont("times", "bold");
    doc.text(name, 105, 100, null, null, "center");
    
    doc.setFontSize(14);
    doc.setFont("times", "normal");
    doc.text("has successfully completed the", 105, 120, null, null, "center");
    doc.setFont("times", "bold");
    doc.text("CS 2206 - Database Management System Midterm Exam", 105, 130, null, null, "center");
    
    // Results
    doc.setFontSize(22);
    doc.setTextColor(0, 74, 153);
    doc.text(`RATING: ${score} / 50`, 105, 160, null, null, "center");
    
    doc.setFontSize(10);
    doc.setTextColor(200, 0, 0);
    doc.text(`Security Integrity: ${violations} Violation(s) Detected`, 105, 170, null, null, "center");

    // Instructor Signature Section
    doc.setTextColor(0);
    doc.setFontSize(12);
    doc.text("Instructor:", 60, 220);
    doc.setFont("times", "bold");
    doc.text("RONALD T. LAVA, MSIT", 60, 226);
    doc.line(60, 227, 110, 227);

    // Footer
    doc.setFontSize(8);
    doc.setFont("times", "italic");
    doc.text("Generated by LU-CCS Secure Exam System - " + new Date().toLocaleString(), 105, 280, null, null, "center");

    doc.save(`${name}_Certificate.pdf`);
}
</script>
</body>
</html>
